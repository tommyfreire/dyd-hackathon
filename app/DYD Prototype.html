<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1280"/>
<title>DYD — Do You Dare · Internal Hackathon Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Geist:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="components/shell.jsx"></script>
<script type="text/babel" src="components/screens-1.jsx"></script>
<script type="text/babel" src="components/screens-2.jsx"></script>
<script type="text/babel" src="components/screens-3.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [route, setRoute] = useState("challenge");
  const [role, setRole] = useState("participant");
  const [user, setUser] = useState(null);
  const [showDesigner, setShowDesigner] = useState(false);

  useEffect(() => {
    DYD.api.getCurrentUser(role).then(setUser);
  }, [role]);

  // Auto-route guards: switch to a sensible page when role changes
  useEffect(() => {
    if (route === "admin" && role !== "admin") setRoute("challenge");
    if (route === "dashboard" && role !== "participant") setRoute("challenge");
  }, [role, route]);

  if (!user) return null;

  return (
    <ToastProvider>
      <div className="app">
        <div className="app-topbar-orange"/>
        <TopBar role={role} onRoleChange={setRole} onNav={setRoute}/>
        <Sidebar route={route} onNav={setRoute} role={role}/>
        <main className="app-main">
          {route === "challenge" && <ChallengePage user={user} onNav={setRoute}/>}
          {route === "ranking"   && <RankingPage user={user} role={role}/>}
          {route === "feed"      && <FeedPage user={user}/>}
          {route === "dashboard" && <DashboardPage user={user} onNav={setRoute}/>}
          {route === "admin"     && <AdminPage/>}
          {route === "agents"    && <AgentsPage onOpenDesigner={() => setShowDesigner(true)}/>}
          {route === "insights"  && <InsightsPage/>}
        </main>
        <DesignerModal open={showDesigner} onClose={() => setShowDesigner(false)}/>
      </div>
    </ToastProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#0B0B0E"/>
  <rect x="20" y="20" width="60" height="60" rx="14" fill="#F66135"/>
  <text x="50" y="62" font-family="Space Grotesk, sans-serif" font-size="22" font-weight="800" text-anchor="middle" fill="#fff">DYD<tspan fill="#0B0B0E">.</tspan></text>
</svg>
</template>
</body>
</html>
