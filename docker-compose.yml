services:
  postgres:
    image: postgres:16-alpine
    container_name: dyd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dyd
      POSTGRES_PASSWORD: dyd
      POSTGRES_DB: dyd
    ports:
      # Host 5433 → container 5432, deliberately NOT 5432 so a developer's
      # local Postgres install never collides. Connection strings in this
      # project use 5433.
      - "5433:5432"
    volumes:
      - dyd_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dyd -d dyd"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  dyd_pg_data:
